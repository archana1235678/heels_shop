{% extends 'base.html' %}

{% block content %}

<h2>🛍 Latest Products</h2>

<div class="row">

    {% for product in products %}

    <div class="col-md-3 mt-3">

        <div class="card p-2">

            {% if product.image %}
            <img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
            {% endif %}

            <h5 class="mt-2">{{ product.name }}</h5>
            <p>₹{{ product.price }}</p>

            <a href="/cart/add/{{ product.id }}/" class="btn btn-danger btn-sm">
                Add to Cart
            </a>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
