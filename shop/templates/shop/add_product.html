{% extends 'shop/base.html' %}

{% block content %}
<div class="card p-4 shadow">
    <h3>Add Product</h3>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Name" class="form-control mb-2">
        <input type="number" name="price" placeholder="Price" class="form-control mb-2">
        <input type="text" name="size" placeholder="Size" class="form-control mb-2">
        <input type="text" name="color" placeholder="Color" class="form-control mb-2">
        <textarea name="description" placeholder="Description" class="form-control mb-2"></textarea>

        <button class="btn btn-success">Add</button>
    </form>
</div>
{% endblock %}
